<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>JNTUA Academic Results Portal</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
scroll-behavior:smooth;
}

body{
background:#f4f8fc;
color:#1d3557;
}

/* HEADER */

header{
background:linear-gradient(90deg,#003566,#00509d);
padding:18px 8%;
display:flex;
justify-content:space-between;
align-items:center;
color:white;
position:sticky;
top:0;
z-index:1000;
box-shadow:0 4px 15px rgba(0,0,0,.08);
}

.logo{
font-size:28px;
font-weight:700;
}

nav{
display:flex;
flex-wrap:wrap;
gap:12px;
}

nav a{
text-decoration:none;
color:white;
padding:10px 16px;
background:rgba(255,255,255,.12);
border-radius:25px;
font-size:14px;
font-weight:500;
transition:.3s;
}

nav a:hover{
background:white;
color:#003566;
}

/* HERO */

.hero{
text-align:center;
padding:30px 15px;   /* reduced space */
background:linear-gradient(to right,#eaf4ff,#ffffff);
}

.hero h1{
font-size:28px;
margin-bottom:8px;
line-height:1.3;
}

.hero p{
font-size:14px;
color:#555;
margin-bottom:15px;
}

.search{
width:100%;
max-width:340px;
padding:12px 18px;
font-size:14px;
border:none;
border-radius:30px;
box-shadow:0 4px 12px rgba(0,0,0,.08);
}

.search{
width:450px;
max-width:95%;
padding:15px 22px;
border:none;
border-radius:40px;
box-shadow:0 4px 15px rgba(0,0,0,.08);
font-size:16px;
}

/* STATS */

.stats{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:25px;
padding:40px 20px;
}

.stat-box{
background:white;
padding:25px 45px;
border-radius:18px;
box-shadow:0 5px 18px rgba(0,0,0,.07);
text-align:center;
}

.stat-box h2{
color:#00509d;
}

/* TITLE */

.section-title{
text-align:center;
margin-top:20px;
font-size:34px;
font-weight:700;
}

/* RESULTS */

.container{
padding:50px 8%;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(350px,1fr));
gap:30px;
}

.card{
background:white;
border-radius:22px;
padding:30px;
box-shadow:0 8px 25px rgba(0,0,0,.08);
transition:.3s;
border-top:5px solid #00509d;
}

.card:hover{
transform:translateY(-8px);
}

.card h2{
margin-bottom:20px;
color:#003566;
}

.result-link{
display:block;
text-decoration:none;
background:#edf5ff;
color:#003566;
padding:14px 18px;
margin:12px 0;
border-radius:12px;
font-weight:500;
transition:.3s;
}

.result-link:hover{
background:#00509d;
color:white;
}

/* FOOTER */

.footer{
margin-top:50px;
background:#003566;
color:white;
text-align:center;
padding:22px;
font-size:18px;
}

/* MOBILE */

@media(max-width:768px){

header{
padding:14px 15px;
flex-direction:column;
gap:15px;
}

.logo{
font-size:22px;
}

nav{
justify-content:center;
}

nav a{
padding:8px 12px;
font-size:13px;
}

.hero{
position:sticky;
top:60px;
z-index:999;
background:#f4f8fc;
}

.hero h1{
font-size:30px;
}

.hero p{
font-size:15px;
}

.search{
width:100%;
font-size:15px;
}

.stats{
display:flex;
justify-content:space-between;
align-items:center;
gap:10px;
padding:20px 15px;
overflow-x:auto;
flex-wrap:nowrap; /* keeps one line */
}

.stat-box{
flex:1;
min-width:110px;
background:white;
padding:16px 10px;
border-radius:14px;
box-shadow:0 4px 10px rgba(0,0,0,.08);
text-align:center;
}

.stat-box h2{
font-size:22px;
color:#00509d;
margin-bottom:5px;
}

.stat-box p{
font-size:13px;
font-weight:500;
}

.section-title{
font-size:26px;
}

.container{
padding:20px;
grid-template-columns:1fr;
gap:20px;
}

.card{
padding:22px;
}

.result-link{
font-size:14px;
padding:13px;
}

.footer{
font-size:15px;
}

}
#topBtn{
position:fixed;
bottom:20px;
right:18px;
border:none;
width:48px;
height:48px;
border-radius:50%;
background:#00509d;
color:white;
font-size:22px;
box-shadow:0 4px 12px rgba(0,0,0,.2);
}
.result-link{
padding:16px 18px;
font-size:15px;
font-weight:600;
}
</style>
</head>
<button id="topBtn" onclick="topFunction()">↑</button>
<body>


<header>

<div class="logo">
JNTUA Results Portal
</div>

<select onchange="location=this.value" class="jump">
<option>Jump to Semester</option>

<section class="hero">

<h1>Academic Results Dashboard</h1>

<p>

</p>

<input

type="text"

<section class="stats">

</div>

</div>

<div class="stat-box">

<p>Coverage</p>
</div>

</section>

<h2 class="section-title">
Available Results
</h2>

<div class="container"
id="resultsContainer">
</div>



<div class="footer">
© Created by
<span style="color:red;font-weight:bold;">
SATHYADEV
</span>
</div>

function showResults(data){

let box=
document.getElementById("resultsContainer");

box.innerHTML="";

data.forEach(item=>{

let card=document.createElement("div");

card.className="card";
card.id=item.id;

let html=
`<h2>${item.semester}</h2>`;

item.links.forEach(link=>{

html += `
<a class="result-link"
href="${link[1]}"
target="_blank">
${link[0]}
</a>`;

});

card.innerHTML=html;

box.appendChild(card);

})

}

showResults(results);



document.getElementById("search")
.addEventListener("keyup",function(){

let keyword=
this.value.toLowerCase();

let filtered=
results.filter(item=>
item.semester.toLowerCase()
.includes(keyword)
);

showResults(filtered);

});

function topFunction(){
window.scrollTo({
top:0,
behavior:"smooth"
});
}
